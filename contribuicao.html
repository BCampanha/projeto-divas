<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto Divas</title>
     <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="stylesheet" href="/css/contribuicao.css" />
  </head>
  <body>
    <div class="content">
      <span>FAÇA PARTE</span>

      <h1>Sua contribuição <br><span>transforma</span> vidas</h1>

      <p>
        Entre em contato com a ONG via email e conte como gostaria de contribuir
        com o Projeto Divas, através de uma doação ou atuando diretamente com
        sua habilidade, seja em saúde, educação, comunicação ou organização.
      </p>
    </div>

    <!-- formulário -->
    <!-- esperando backend -->
    <form action="#" method="post">
      <label for="">NOME</label>
      <input type="text" name="nome" required />

      <label for="">SOBRENOME</label>
      <input type="text" name="sobrenome" required />

      <label for="">EMAIL</label>
      <input type="email" name="email" required />

      <label for="">TELEFONE</label>
      <input type="" name="telefone" required />

      <label for="">SENHA</label>
      <input type="password" name="senha" required />

      <label for="">MENSAGEM</label>
      <textarea name="mensagem" id="" required rows="5"></textarea>

      <button type="submit">Enviar mensagem</button>
    </form>
  </body>
</html>
