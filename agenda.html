<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto Divas</title>
    <link rel="stylesheet" href="/css/agenda.css" />
  </head>
  <body>
    <div class="dashboard-grid">
      <aside class="sidebar-esq">
        <div class="logo">
          <img src="./images/logo.png" alt="" />
          <span>Projeto Divas</span>
        </div>

        <div class="bt-navegacao">
          <img src="./images/icone-7.png" alt="" />
          <a href="./agenda.html">Início</a>
        </div>

        <div class="bt-navegacao">
          <img src="./images/icone-8.png" alt="" />
          <a href="">Sair</a>
        </div>

        <div class="pefil">
          <img src="./images/icone-9.png" alt="" />
          <a href="">NOME DA PACIENTE</a>
          <!--ESPERANDO BACKEND-->
        </div>
      </aside>

      <main class="conteudo-principal">
        <!-- Cabeçalho de boas-vindas -->
        <div class="conteudo-superior">
          <h1>Olá, NOME DA PACIENTE</h1>
          <!--ESPERANDO BACKEND-->
          <span>(DIA, XX DE MÊS <br />ANO )</span>
        </div>

        <!-- CONTAINER DA TIMELINE (Onde os cards vão aparecer) -->
  <div class="timeline" id="timeline-lembretes">
    
    <!-- MENSAGEM CASO ESTEJA VAZIO -->
    <div class="mensagem-vazia">
      <p>Nenhum lembrete para hoje. Use o formulário ao lado para agendar! 💊</p>
    </div>

    <!--JS vai injetar os cards aqui dentro -->

  </div>
      </main>

      <aside class="sidebar-dir">
        <h3>Novo Lembrete</h3>

        <div class="calendario">
          <!-- Header com navegação -->
          <div class="calendario-header">
            <button class="btn-navegacao" id="btn-anterior">&lt;</button>
            <h3 id="mes-ano">Abril 2026</h3>
            <button class="btn-navegacao" id="btn-proximo">&gt;</button>
          </div>

          <!-- Dias da semana -->
          <div class="dias-semana">
            <span>DOM</span>
            <span>SEG</span>
            <span>TER</span>
            <span>QUA</span>
            <span>QUI</span>
            <span>SEX</span>
            <span>SÁB</span>
          </div>

          <!-- Grid dos dias (preenchido via JS) -->
          <div class="dias-mes" id="grid-dias"></div>
        </div>

        <hr />

        <form id="form-lembrete"class="form-novo-lembrete">
            <label>DATA</label>
            <input type="text" id="data-input" placeholder="DD/MM/AAAA" readonly required>

            <label>HORÁRIO</label>
            <input type="text" id="horario-input" placeholder="--:--" maxlength="5" required>

            <label>ETIQUETA</label>
            <div class="etiquetas-container">
                <button type="button" class="etiqueta-btn" data-tag="medicacao">Medicação</button>
                <button type="button" class="etiqueta-btn" data-tag="consulta">Consulta</button>
                <button type="button" class="etiqueta-btn" data-tag="exame">Exame</button>
            </div>

            <label>TÍTULO</label>
            <input type="text" id="titulo-input" placeholder="Ex: Quimioterapia" required>

            <label>DESCRIÇÃO</label>
            <textarea id="descricao-input" placeholder="Informações adicionais, local, o que levar..." rows="3" required>
            </textarea>

            <button type="submit" class="btn-salvar">Salvar Lembrete</button>
        </form>
      </aside>
    </div>
  </body>
</html>
