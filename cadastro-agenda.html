<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto Divas</title>
    <link rel="stylesheet" href="./css/cadastro-agenda.css" />
  </head>
  <body>
    <div class="conteiner">
      <div class="titulo">
        <h1>Cadastro</h1>
        <span>Já tem uma conta? <a href="./index.html#agenda">Login</a></span>
      </div>

      <!-- esperando backend -->
      <form action="#" method="post">
        <label for="">NOME</label>
        <input type="text" name="nome" required/>

        <label for="">EMAIL</label>
        <input type="email" name="email" required/>

        <label for="">TELEFONE</label>
        <input type="" name="telefone" required/>

        <label for="">SENHA</label>
        <input type="password" name="senha" required/>

        <button type="submit">Cadastrar</button>
      </form>
    </div>

    <img src="/images/foto-8.png" alt="" class="passaro">
  </body>
